<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sneaker Shop - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
      color: #333;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #333;
    }

    .subtitle {
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .error.show {
      display: block;
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .toggle-form a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .credentials-hint {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 5px;
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">👟 Sneaker Shop</div>
    
    <div id="loginForm" class="form-container">
      <h1>Login</h1>
      <p class="subtitle">Welcome back!</p>
      
      <div class="credentials-hint">
        Compte test: user@sneakers.com / user123<br>
        Admin: admin@sneakers.com / admin
      </div>

      <div id="loginError" class="error"></div>

      <form id="loginFormElement">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="toggle-form">
        Don't have an account? <a onclick="toggleForm()">Register here</a>
      </div>
    </div>

    <div id="registerForm" class="form-container" style="display: none;">
      <h1>Create Account</h1>
      <p class="subtitle">Join our sneaker community</p>

      <div id="registerError" class="error"></div>

      <form id="registerFormElement">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="registerUsername" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="Your email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required>
        </div>

        <button type="submit">Create Account</button>
      </form>

      <div class="toggle-form">
        Already have an account? <a onclick="toggleForm()">Login here</a>
      </div>
    </div>
  </div>

  <script>
    function toggleForm() {
      const login = document.getElementById('loginForm');
      const register = document.getElementById('registerForm');
      login.style.display = login.style.display === 'none' ? 'block' : 'none';
      register.style.display = register.style.display === 'none' ? 'block' : 'none';
    }

    function showError(id, message) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/dashboard.html';
        } else {
          showError('loginError', data.error);
        }
      } catch (err) {
        showError('loginError', 'Network error');
      }
    });

    document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('registerUsername').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/dashboard.html';
        } else {
          showError('registerError', data.error);
        }
      } catch (err) {
        showError('registerError', 'Network error');
      }
    });
  </script>
</body>
</html>
